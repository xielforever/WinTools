name: 发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: '发布标签，必须符合 v主版本.次版本.修订版本（例如 v0.1.0）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 解析并校验版本
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.version_tag }}"
          }
          else {
            $tag = "${{ github.ref_name }}"
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "版本标签不合法：'$tag'。期望格式：v主版本.次版本.修订版本（如 v0.1.0）"
          }

          $versionCore = $tag.Substring(1)
          "version_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version_core=$versionCore" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装构建依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: 构建 OneDir 与 OneFile 产物
        shell: pwsh
        env:
          WINTOOLS_VERSION: ${{ steps.version.outputs.version_core }}
        run: |
          .\scripts\build.ps1 -Version "${{ steps.version.outputs.version_tag }}" -SkipDependencyInstall

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: wintools-${{ steps.version.outputs.version_tag }}
          path: |
            dist/WinTools-${{ steps.version.outputs.version_tag }}-windows-onedir.zip
            dist/WinTools-${{ steps.version.outputs.version_tag }}-windows-onefile.exe

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          generate_release_notes: true
          body_path: .github/release-template.md
          files: |
            dist/WinTools-${{ steps.version.outputs.version_tag }}-windows-onedir.zip
            dist/WinTools-${{ steps.version.outputs.version_tag }}-windows-onefile.exe
