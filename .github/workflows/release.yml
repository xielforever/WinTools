name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag, must match vMAJOR.MINOR.PATCH (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve and validate version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.version_tag }}"
          }
          else {
            $tag = "${{ github.ref_name }}"
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Invalid version tag '$tag'. Expected vMAJOR.MINOR.PATCH"
          }

          $versionCore = $tag.Substring(1)
          "version_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version_core=$versionCore" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build OneDir + OneFile artifacts
        shell: pwsh
        env:
          WINTOOLS_VERSION: ${{ steps.version.outputs.version_core }}
        run: |
          .\scripts\build.ps1 -Version "${{ steps.version.outputs.version_tag }}" -SkipDependencyInstall

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wintools-${{ steps.version.outputs.version_tag }}
          path: |
            dist/WinTools-${{ steps.version.outputs.version_tag }}-windows-onedir.zip
            dist/WinTools-${{ steps.version.outputs.version_tag }}-windows-onefile.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          generate_release_notes: true
          body_path: .github/release-template.md
          files: |
            dist/WinTools-${{ steps.version.outputs.version_tag }}-windows-onedir.zip
            dist/WinTools-${{ steps.version.outputs.version_tag }}-windows-onefile.exe
